<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soccer Trivia Web App</title>
  <style>
    body { font-family: Arial, sans-serif; background-color: #f4f8fb; text-align: center; padding: 30px; color: #222; }
    .app { max-width: 700px; margin: auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 0 15px rgba(0,0,0,0.1); }
    button { padding: 12px 18px; margin: 8px; border: none; border-radius: 8px; background-color: #0f5132; color: white; cursor: pointer; }
    button:hover { background-color: #198754; }
    #result { font-weight: bold; margin-top: 20px; }
    a { color: #0d6efd; font-weight: bold; }
  </style>
</head>
<body>
  <div class="app">
    <h1>Soccer Trivia Game</h1>
    <p>Answer the question below and test your soccer knowledge.</p>
    <h2 id="question"></h2>
    <div id="answers"></div>
    <p id="result"></p>
    <p>Score: <span id="score">0</span></p>
    <button onclick="nextQuestion()">Next Question</button>
    <p><a href="scratch.html">Back to Scratch Page</a> | <a href="index.html">Back to Home</a></p>
  </div>

  <script>
    const questions = [
      { q: "How many players are on the field for one soccer team?", a: ["9", "10", "11", "12"], correct: "11" },
      { q: "What position usually protects the goal?", a: ["Striker", "Goalkeeper", "Winger", "Midfielder"], correct: "Goalkeeper" },
      { q: "What is it called when a player scores three goals in one game?", a: ["Hat trick", "Triple play", "Goal rush", "Three kick"], correct: "Hat trick" },
      { q: "Which body part cannot be used by field players?", a: ["Head", "Chest", "Hands", "Feet"], correct: "Hands" }
    ];

    let current = 0;
    let score = 0;

    function showQuestion() {
      document.getElementById("result").textContent = "";
      const item = questions[current];
      document.getElementById("question").textContent = item.q;
      const answersDiv = document.getElementById("answers");
      answersDiv.innerHTML = "";
      item.a.forEach(answer => {
        const btn = document.createElement("button");
        btn.textContent = answer;
        btn.onclick = () => checkAnswer(answer);
        answersDiv.appendChild(btn);
      });
    }

    function checkAnswer(answer) {
      const correct = questions[current].correct;
      if (answer === correct) {
        document.getElementById("result").textContent = "Correct!";
        score++;
        document.getElementById("score").textContent = score;
      } else {
        document.getElementById("result").textContent = "Not quite. The correct answer is " + correct + ".";
      }
    }

    function nextQuestion() {
      current = (current + 1) % questions.length;
      showQuestion();
    }

    showQuestion();
  </script>
</body>
</html>
